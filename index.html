<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="stylesheet" href="/src/styles.css" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Media Search</title>
        <script type="module" src="/src/main.ts" defer></script>
    </head>

    <body>
        <div class="titlebar">
            <div data-tauri-drag-region></div>
            <div class="controls">
                <button id="titlebar-minimize">
                    <div>
                        <svg
                            viewBox="0 0 24 24"
                            stroke="currentColor"
                            transform="rotate(90)"
                        >
                            <path
                                d="M12 19V5"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            ></path>
                        </svg>
                    </div>
                </button>
                <button id="titlebar-maximize">
                    <div>
                        <svg
                            fill="currentColor"
                            viewBox="-3 -5 26 26"
                            stroke="currentColor"
                            stroke-width="0.24"
                        >
                            <path
                                d="M3 2a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1H3zm0-2h14a3 3 0 0 1 3 3v10a3 3 0 0 1-3 3H3a3 3 0 0 1-3-3V3a3 3 0 0 1 3-3z"
                            ></path>
                        </svg>
                    </div>
                </button>
                <button id="titlebar-close">
                    <div>
                        <svg
                            fill="currentColor"
                            viewBox="-153.6 -153.6 1331.20 1331.20"
                            xmlns="http://www.w3.org/2000/svg"
                            stroke-width="0.01024"
                        >
                            <path
                                d="M512.481 421.906L850.682 84.621c25.023-24.964 65.545-24.917 90.51.105s24.917 65.545-.105 90.51L603.03 512.377 940.94 850c25.003 24.984 25.017 65.507.033 90.51s-65.507 25.017-90.51.033L512.397 602.764 174.215 940.03c-25.023 24.964-65.545 24.917-90.51-.105s-24.917-65.545.105-90.51l338.038-337.122L84.14 174.872c-25.003-24.984-25.017-65.507-.033-90.51s65.507-25.017 90.51-.033L512.48 421.906z"
                            ></path>
                        </svg>
                    </div>
                </button>
            </div>
        </div>

        <main class="container">
            <div class="left-panel">
                <div class="column-titlebar">
                    <h1 class="centered-text">Media Search</h1>
                </div>

                <div class="status-text" id="model-status">
                    Model not loaded
                </div>
                <div class="status-text" id="device-label">Device: unknown</div>

                <div class="vertical-divider-full"></div>

                <h2>Select folder to index</h2>
                <div class="input-group">
                    <label>Search directory</label>
                    <div class="input-row">
                        <input
                            type="text"
                            id="index-dir"
                            placeholder="Select search directory"
                            readonly
                        />
                        <button
                            class="btn icon-button"
                            id="index-dir-browse-btn"
                        >
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                viewBox="0 0 24 24"
                                fill="currentColor"
                            >
                                <path
                                    d="M19.5 21a3 3 0 0 0 3-3v-4.5a3 3 0 0 0-3-3h-15a3 3 0 0 0-3 3V18a3 3 0 0 0 3 3h15ZM1.5 10.146V6a3 3 0 0 1 3-3h5.379a2.25 2.25 0 0 1 1.59.659l2.122 2.121c.14.141.331.22.53.22H19.5a3 3 0 0 1 3 3v1.146A4.483 4.483 0 0 0 19.5 9h-15a4.483 4.483 0 0 0-3 1.146Z"
                                />
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="param-row">
                    <label>Batch size:</label>
                    <input type="number" id="batch-size" value="8" />
                </div>

                <button
                    class="btn full-width-button progress-btn"
                    id="indexing-btn"
                >
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 24 24"
                        fill="currentColor"
                    >
                        <path
                            fill-rule="evenodd"
                            d="M9 4.5a.75.75 0 0 1 .721.544l.813 2.846a3.75 3.75 0 0 0 2.576 2.576l2.846.813a.75.75 0 0 1 0 1.442l-2.846.813a3.75 3.75 0 0 0-2.576 2.576l-.813 2.846a.75.75 0 0 1-1.442 0l-.813-2.846a3.75 3.75 0 0 0-2.576-2.576l-2.846-.813a.75.75 0 0 1 0-1.442l2.846-.813A3.75 3.75 0 0 0 7.466 7.89l.813-2.846A.75.75 0 0 1 9 4.5ZM18 1.5a.75.75 0 0 1 .728.568l.258 1.036c.236.94.97 1.674 1.91 1.91l1.036.258a.75.75 0 0 1 0 1.456l-1.036.258c-.94.236-1.674.97-1.91 1.91l-.258 1.036a.75.75 0 0 1-1.456 0l-.258-1.036a2.625 2.625 0 0 0-1.91-1.91l-1.036-.258a.75.75 0 0 1 0-1.456l1.036-.258a2.625 2.625 0 0 0 1.91-1.91l.258-1.036A.75.75 0 0 1 18 1.5ZM16.5 15a.75.75 0 0 1 .712.513l.394 1.183c.15.447.5.799.948.948l1.183.395a.75.75 0 0 1 0 1.422l-1.183.395c-.447.15-.799.5-.948.948l-.395 1.183a.75.75 0 0 1-1.422 0l-.395-1.183a1.5 1.5 0 0 0-.948-.948l-1.183-.395a.75.75 0 0 1 0-1.422l1.183-.395c.447-.15.799-.5.948-.948l.395-1.183A.75.75 0 0 1 16.5 15Z"
                            clip-rule="evenodd"
                        />
                    </svg>
                    <span>Index files</span>
                </button>

                <div class="status-text" id="index-status"></div>

                <div class="vertical-divider-full"></div>

                <h2>Search</h2>
                <div class="radio-group">
                    <label class="radio-label">
                        <input
                            type="radio"
                            name="search-type"
                            value="text"
                            checked
                        />
                        Text search
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="search-type" value="image" />
                        Image search
                    </label>
                </div>

                <div id="text-input-container" class="input-group">
                    <input
                        type="text"
                        id="query-text"
                        placeholder="Enter search query"
                    />
                </div>

                <div id="image-input-container" class="input-group hidden">
                    <div class="input-row">
                        <input
                            type="text"
                            id="query-image"
                            placeholder="Click the button to select image"
                            readonly
                        />
                        <button
                            class="btn icon-button"
                            id="query-img-browse-btn"
                        >
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                viewBox="0 0 24 24"
                                fill="currentColor"
                            >
                                <path
                                    fill-rule="evenodd"
                                    d="M1.5 6a2.25 2.25 0 0 1 2.25-2.25h16.5A2.25 2.25 0 0 1 22.5 6v12a2.25 2.25 0 0 1-2.25 2.25H3.75A2.25 2.25 0 0 1 1.5 18V6ZM3 16.06V18c0 .414.336.75.75.75h16.5A.75.75 0 0 0 21 18v-1.94l-2.69-2.689a1.5 1.5 0 0 0-2.12 0l-.88.879.97.97a.75.75 0 1 1-1.06 1.06l-5.16-5.159a1.5 1.5 0 0 0-2.12 0L3 16.061Zm10.125-7.81a1.125 1.125 0 1 1 2.25 0 1.125 1.125 0 0 1-2.25 0Z"
                                    clip-rule="evenodd"
                                />
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="param-row">
                    <label>Max results:</label>
                    <input type="number" id="max-results" value="50" />
                </div>

                <div class="param-row">
                    <label>Score threshold:</label>
                    <input
                        type="number"
                        id="threshold"
                        step="0.01"
                        value="0.05"
                    />
                </div>

                <button class="btn full-width-button" id="search-btn">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 24 24"
                        fill="currentColor"
                    >
                        <path
                            fill-rule="evenodd"
                            d="M10.5 3.75a6.75 6.75 0 1 0 0 13.5 6.75 6.75 0 0 0 0-13.5ZM2.25 10.5a8.25 8.25 0 1 1 14.59 5.28l4.69 4.69a.75.75 0 1 1-1.06 1.06l-4.69-4.69A8.25 8.25 0 0 1 2.25 10.5Z"
                            clip-rule="evenodd"
                        />
                    </svg>
                    <span>Search</span>
                </button>
            </div>

            <div class="divider"></div>

            <div class="right-panel">
                <div class="column-titlebar results-titlebar">
                    <h1 class="centered-text">Search Results</h1>
                </div>

                <div id="results-container"></div>
            </div>
        </main>
    </body>
</html>
