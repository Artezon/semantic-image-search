[package]
name = "semantic-search"
version = "0.1.0"
description = "A Tauri App"
authors = ["Artezon"]
edition = "2021"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-dialog = "2"
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rusqlite = { version = "0.38", features = ["bundled"] }
sqlite-vec = "0.1"
rusqlite_migration = { version = "2.4", features = ["from-directory"] }
include_dir = "0.7"
anyhow = "1"

[features]
default = ["portable"]
portable = []

[profile.release-opt]
inherits = "release"
opt-level = 3
lto = true
codegen-units = 1
strip = true
